name: CI Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install flake8
      - run: flake8 app/ tests/ --max-line-length=120 --ignore=E501,E302,E303,E305,W503,W291,W293,E711,E712,F401,W292,W391,E221,E231,E241,E401,W504,W605,E226,E228

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install typer==0.9.4 spacy==3.7.4
      - run: pip install --no-deps fastapi==0.111.0
      - run: pip install starlette==0.37.2 uvicorn motor pymongo pydantic pydantic-settings scikit-learn pandas numpy requests python-dotenv pytest httpx pytest-asyncio email-validator python-multipart orjson ujson jinja2
      - run: pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
      - env:
          MONGODB_URL: mongodb://localhost:27017
          DATABASE_NAME: travel_db_test
          OPENWEATHER_API_KEY: test_key
        run: pytest tests/ -v

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t travel-api .